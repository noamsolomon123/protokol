# Alembic configuration for the Knesset OSINT platform.
#
# Run from the PROJECT ROOT (where this file lives):
#   python -m alembic revision --autogenerate -m "message"
#   python -m alembic upgrade head
#   python -m alembic downgrade -1
#
# The database URL is NOT hard-coded here (objectivity/security invariant: no
# secrets in source). `alembic/env.py` reads it from `settings.database_url`,
# which itself reads the DATABASE_URL environment variable. To run against a
# throwaway SQLite db (no Postgres needed), e.g. on Windows cmd:
#   set DATABASE_URL=sqlite:///./_alembic_tmp.db && python -m alembic upgrade head

[alembic]
# Path to migration scripts, relative to the project root.
script_location = alembic

# Template used to generate new migration files (see alembic/script.py.mako).
# Timestamped, slug-prefixed filenames keep the versions/ dir readable as the
# schema grows (more politicians/sources => more migrations over time).
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

# sys.path entries prepended on startup so `import knesset_osint` resolves even
# without the editable install. The package is src-layout.
prepend_sys_path = src

# Use OS-native path separators when writing version file paths.
version_path_separator = os

# sqlalchemy.url is intentionally LEFT BLANK. env.py injects the URL from
# settings/env at runtime. Do not put a real connection string here.
sqlalchemy.url =


# Logging configuration. Alembic uses Python's logging; these handlers print
# migration progress + emitted SQL to stderr.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
